<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unknown Pizza</title>
    </head>
    <body>
        <header>
            <h1>Unknown Pizza</h1>
        </header>
        <nav>
            <a id="order" href="order.html">ORDER</a>
        </nav>
        <main>
            <h2>Add/Modify Item</h2>
            <form>
                <div>
                    <div id="modify-item-imagediv">
                        <img alt="image to display item as" src="">
                        <label for="modify-item-image-dropdown">Use predefined image:</label>
                        <select id="modify-item-image-dropdown">
                            <option name="blank" checked></option>
                            <option name="opt1">Hawk</option>
                            <option name="opt2">Tuah</option>
                        </select>
                        <label for="modify-item-image-url">Use image URL:</label>
                        <input id="modify-item-image-url">
                    </div>
                    <div id="modify-item-description">
                        <label for="modify-item-name">Item name:</label>
                        <input id="modify-item-name">
                        <label for="modify-item-description">Item description:</label>
                        <textarea id="modify-item-description"></textarea>
                    </div>
                    <div id="modify-item-options">
                        <button>Save changes</button>
                        <button>Cancel changes</button>
                        <button>Delete item</button>
                    </div>
                    <div id="modify-item-propertydiv">
                        <label for="modify-item-size">Item name:</label>
                        <select id="modify-item-size">
                            <option name="small">Small</option>
                            <option name="medium">Medium</option>
                            <option name="large">Large</option>
                        </select>
                        <label for="modify-item-crust">Item name:</label>
                        <select id="modify-item-crust">
                            <option name="regular">Regular</option>
                            <option name="thin">Thin</option>
                            <option name="stuffed">Stuffed</option>
                        </select>
                    </div>
                    <div id="modify-item-toppingsdiv">
                        <input type="radio" name="modify-item-toppings" id="toppings-top1" value="Cheese">
                        <label for="toppings-top1">Cheese</label>
                        <input type="radio" name="modify-item-toppings" id="toppings-top2" value="Pepperoni">
                        <label for="toppings-top1">Pepperoni</label>
                        <input type="radio" name="modify-item-toppings" id="toppings-top3" value="Wet Mulch">
                        <label for="toppings-top1">Wet Mulch</label>
                    </div>
                </div>
            </form>
        </main>
        <footer>

        </footer>
    </body>
</html>
